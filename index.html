    async function fetchWithTimeout(url, options = {}, timeout = 8000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(timeoutId);
            return response;
        } catch (error) {
            clearTimeout(timeoutId);
            if (error.name === 'AbortError') throw new Error('Request timeout');
            throw error;
        }
    }

    function convertUnit() {
        let v = parseFloat(document.getElementById('convVal')?.value);
        if(isNaN(v)) { if(document.getElementById('convResult')) document.getElementById('convResult').innerHTML = `${t('result')}: --`; return; }
        let f = document.getElementById('srcUnit')?.value, tgt = document.getElementById('dstUnit')?.value;
        if(!f || !tgt) return;
        let res;
        if(currentType === 'temperature') {
            let c = f === "°C" ? v : (f === "°F" ? (v-32)*5/9 : v-273.15);
            res = tgt === "°C" ? c : (tgt === "°F" ? c*9/5+32 : c+273.15);
        } else {
            const base = unitData[currentType].base;
            if(!base[f] || !base[tgt]) return;
            res = v * base[f] / base[tgt];
        }
        document.getElementById('convResult').innerHTML = `${t('result')}: ${res.toFixed(4)} ${tgt}`;
        lastCalcText = `${v} ${f} = ${res.toFixed(4)} ${tgt}`;
        addHistory(lastCalcText);
    }

    function calcPipe() {

        let len = parseFloat(document.getElementById('pipeLen')?.value) || 0;
        let th = parseFloat(document.getElementById('insThick')?.value) || 0;
        if(od && len) {
            let paint = (Math.PI * od / 1000) * len;
            let ins = (Math.PI * (od + th * 2) / 1000) * len;
            document.getElementById('pipeAreaResult').innerHTML = `${t('pipePaint')}: ${paint.toFixed(2)} m² | ${t('pipeIns')}: ${ins.toFixed(2)} m²`;
            addHistory(`${t('pipePaint')}: ${paint.toFixed(2)}m²`);
        }
    }

        if(civilType === 'area') { res = L * W; txt = `${t('civilArea')}: ${res.toFixed(2)} m²`; }

        else if(civilType === 'concrete') { res = L * W * H; txt = `${t('civilConcrete')}: ${res.toFixed(2)} m³`; }

    async function handleManualActivate() {
        if (isActivating) return;
        const manualBtn = document.getElementById('manualActivateBtn');
        const emailInput = document.getElementById('paymentEmail');
        const email = emailInput ? emailInput.value.trim() : '';
        if (!email) { showMessage(t('pleaseEnterEmail'), 'warning'); return; }
        if (!email.includes('@') || !email.includes('.')) { showMessage(t('invalidEmail'), 'warning'); return; }
        if (isPro || activatedEmails.has(email)) { showMessage(t('alreadyActivated'), 'success'); closePaymentModal(); return; }
        isActivating = true;
        if (manualBtn) { manualBtn.classList.add('loading'); manualBtn.textContent = t('activatingBtn'); }
        try {
            try { localStorage.setItem('user_email', email); localStorage.setItem('engicalc_pro_tier', 'pro'); } catch(e) { showMessage(t('storageWarningMsg'), 'warning'); }
            activatedEmails.add(email);
            await new Promise(resolve => setTimeout(resolve, 800));
            isPro = true; subscription = { tier: 'pro', maxHistory: Infinity };
            updateProUI(); buildPanels(); renderHistory();
            showMessage(t('activateSuccess'), 'success');
            closePaymentModal();
            setTimeout(() => location.reload(), 1500);
        } catch(err) { showMessage(t('activateFailed'), 'error'); }
        finally { isActivating = false; if (manualBtn) { manualBtn.classList.remove('loading'); manualBtn.textContent = t('activateBtn'); } }
    }

<!-- ========== 权限加固代码 ========== -->
<script>
(function(){
    function isProUser() {
        try {
            const proTier = localStorage.getItem('engicalc_pro_tier');
            if (proTier === 'pro') return true;
            return false;
        } catch(e) { return false; }
    }
    
    function getCurrentLang() {
        try {
            const langSelect = document.getElementById('langSelector');
            if (langSelect && langSelect.value) return langSelect.value;
        } catch(e) {}
        return 'zh';
    }
    
    function showUpgradeAlert() {
        const lang = getCurrentLang();
        const title = lang === 'zh' ? '⚠️ 专业版功能' : '⚠️ PRO Feature';
        const message = lang === 'zh' 
            ? '此功能需要升级专业版才能使用。\n\n点击「购买专业版」解锁全部功能。\n\n💰 一次性支付 $4.99，永久使用。'
            : 'This feature requires PRO version.\n\nClick "BUY PRO" to unlock all features.\n\n💰 One-time payment $4.99, lifetime access.';
        
        const upgradeBtn = document.getElementById('upgradeBtn');
        if (upgradeBtn) {
            upgradeBtn.style.animation = 'pulse 0.5s ease 3';
            setTimeout(() => { if (upgradeBtn.style) upgradeBtn.style.animation = ''; }, 1500);
        }
        
        alert(title + '\n\n' + message);
    }
    
    function disableProFunctions() {
        if (isProUser()) return;
        
        const proElements = document.querySelectorAll('.pro-function');
        proElements.forEach(function(el) {
            if (el.hasAttribute('data-pro-locked')) return;
            el.setAttribute('data-pro-locked', 'true');
            
            el.style.cursor = 'pointer';
            
            if (el.tagName === 'BUTTON' || el.classList.contains('action-btn') || el.classList.contains('small-btn')) {
                el.style.opacity = '0.6';
                el.style.filter = 'grayscale(0.2)';
            }
            
            if (!el.querySelector('.pro-lock-icon')) {
                const lockSpan = document.createElement('span');
                lockSpan.className = 'pro-lock-icon';
                lockSpan.innerHTML = ' 🔒';
                lockSpan.style.fontSize = '12px';
                lockSpan.style.opacity = '0.7';
                el.appendChild(lockSpan);
            }
            
            el.addEventListener('click', function(e) {
                if (!isProUser()) {
                    e.preventDefault();
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    showUpgradeAlert();
                    return false;
                }
            }, true);
        });
    }
    
    function observeDOMForProFunctions() {
        const observer = new MutationObserver(function(mutations) {
            let shouldCheck = false;
            mutations.forEach(function(mutation) {
                if (mutation.addedNodes && mutation.addedNodes.length > 0) {
                    shouldCheck = true;
                }
            });
            if (shouldCheck) {
                setTimeout(disableProFunctions, 100);
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
    }
    
    let lastProStatus = isProUser();
    function watchProStatus() {
        const currentStatus = isProUser();
        if (currentStatus !== lastProStatus) {
            lastProStatus = currentStatus;
            disableProFunctions();
        }
        setTimeout(watchProStatus, 3000);
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            disableProFunctions();
            observeDOMForProFunctions();
            setTimeout(watchProStatus, 1000);
        });
    } else {
        disableProFunctions();
        observeDOMForProFunctions();
        setTimeout(watchProStatus, 1000);
    }
})();
</script>
